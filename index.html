  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FLUMO</title>
    <meta name="apple-mobile-web-app-title" content="FLUMO" />
    <link rel="icon" href="icon.png" />

    <style>
      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f5f5f7;
        color: #1f2937;
      }

      /* ── основные экраны ── */
      .screen {
        min-height: 100vh;
        padding: 40px 24px;
        display: flex;
        justify-content: center;
      }

      .welcome-screen {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 32px 24px;
        cursor: pointer;
      }

      .welcome-card {
        width: 100%;
        max-width: 700px;
        background: transparent;
        padding: 0;
        box-shadow: none;
      }

      .app-shell { width: 100%; max-width: 900px; margin: 0 auto; }

      .panel {
        background: transparent;
        padding: 20px 10px;
        padding-bottom: 140px;
        box-shadow: none;
      }

      .title { margin: 0; font-size: 48px; line-height: 1.2; }
      .subtitle { margin: 14px 0 0; color: #6b7280; font-size: 16px; line-height: 1.5; }
      .hint { margin-top: 22px; color: #8b5cf6; font-size: 14px; font-weight: 600; }

      .header-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-bottom: 18px;
        position: sticky;
        top: 0;
        z-index: 50;
        background: #f3f4f6;
        padding-top: 8px;
        padding-bottom: 12px;
      }

      .header-text h1, .header-text h2 { margin: 0; }
      .header-text p { margin: 8px 0 0; color: #6b7280; line-height: 1.4; }

      .nav-actions { display: flex; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }

      .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }

      .topic-btn, .subtopic-btn, .mode-btn, .action-btn {
        border: none;
        border-radius: 16px;
        padding: 20px 16px;
        font-size: 15px;
        font-weight: 600;
        line-height: 1.35;
        cursor: pointer;
        transition: transform 0.12s ease, opacity 0.12s ease;
        display: flex;
        align-items: center;
        justify-content: space-between;
        text-align: left;
      }

      .btn-icon { font-size: 18px; opacity: 0.9; margin-left: 12px; flex-shrink: 0; }

      .topic-btn:hover, .subtopic-btn:hover, .mode-btn:hover, .action-btn:hover { transform: translateY(-1px); }
      .topic-btn, .subtopic-btn, .mode-btn { background: #ede9fe; color: #4c1d95; }
      .random-btn { background: #ddd6fe; color: #5b21b6; }

      .action-btn { background: #111827; color: white; padding: 12px 16px; border-radius: 12px; font-size: 14px; }
      .action-btn.secondary { background: #e5e7eb; color: #111827; }

      .trainer-box { text-align: center; padding: 24px 8px 8px; }
      .trainer-title { margin: 0 0 10px; font-size: 28px; }
      .trainer-subtitle { margin: 0; color: #6b7280; line-height: 1.5; }
      .trainer-placeholder { margin-top: 22px; padding: 18px; border-radius: 18px; background: #f9fafb; border: 1px solid #ececf1; text-align: left; }
      .trainer-placeholder h3 { margin-top: 0; margin-bottom: 10px; font-size: 18px; }
      .trainer-placeholder p { margin: 8px 0; color: #4b5563; line-height: 1.5; }

      .breadcrumbs { margin-top: 6px; margin-bottom: 18px; color: #8b5cf6; font-size: 13px; font-weight: 600; }

      /* ══════════════════════════════
         ТЕОРИЯ — новые стили
         ══════════════════════════════ */

      .theory-page {
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        background: #f5f5f7;
      }

      /* ── верхняя панель ── */
      .theory-topbar {
        position: sticky;
        top: 0;
        z-index: 100;
        background: #fff;
        border-bottom: 1px solid #e5e7eb;
        padding: 14px 24px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        box-shadow: 0 1px 10px rgba(0,0,0,0.07);
      }

      .theory-topbar-info h2 {
        margin: 0;
        font-size: 18px;
        font-weight: 700;
        color: #111827;
      }

      .theory-topbar-info p {
        margin: 3px 0 0;
        color: #6b7280;
        font-size: 13px;
      }

      .theory-topbar-btns { display: flex; gap: 8px; flex-shrink: 0; }

      /* отдельные кнопки для теории (без конфликта с .nav-actions mobile fix) */
      .theory-btn {
        border: none;
        border-radius: 10px;
        padding: 9px 16px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.15s;
        background: #111827;
        color: #fff;
        white-space: nowrap;
      }
      .theory-btn:hover { opacity: 0.82; }
      .theory-btn.secondary { background: #e5e7eb; color: #111827; }

      /* ── боковое меню + контент ── */
      .theory-body { display: flex; flex: 1; }

      .theory-sidebar {
        width: 220px;
        flex-shrink: 0;
        position: sticky;
        top: 69px;                    /* высота topbar (14+14+41=69px) */
        height: calc(100vh - 69px);
        overflow-y: auto;
        padding: 18px 10px 40px;
        background: #fff;
        border-right: 1px solid #e5e7eb;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .theory-sidebar-label {
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: #9ca3af;
        padding: 0 10px;
        margin: 0 0 10px;
      }

      .theory-nav-link {
        display: flex;
        align-items: flex-start;
        gap: 8px;
        padding: 9px 10px;
        border-radius: 10px;
        color: #6b7280;
        font-size: 12.5px;
        font-weight: 500;
        line-height: 1.45;
        cursor: pointer;
        border: none;
        background: transparent;
        text-align: left;
        width: 100%;
        transition: background 0.15s, color 0.15s;
      }
      .theory-nav-link:hover  { background: #f3e8ff; color: #5b21b6; }
      .theory-nav-link.active { background: #ede9fe; color: #4c1d95; font-weight: 700; }

      .theory-nav-num {
        font-size: 11px;
        color: #a78bfa;
        font-weight: 700;
        min-width: 16px;
        padding-top: 1px;
        flex-shrink: 0;
      }

      /* ── основной контент ── */
      .theory-content { flex: 1; padding: 36px 32px 80px; }

      .theory-section {
        margin-bottom: 60px;
        scroll-margin-top: 82px;      /* отступ под topbar */
      }

      .theory-section-header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 18px;
        padding-bottom: 12px;
        border-bottom: 2px solid #ede9fe;
      }

      .theory-section-emoji { font-size: 24px; line-height: 1; flex-shrink: 0; }

      .theory-section-title {
        margin: 0;
        font-size: 18px;
        color: #3b0764;
        font-weight: 700;
      }

      .theory-term-card {
        display: flex;
        gap: 14px;
        align-items: flex-start;
        padding: 13px 16px;
        background: #fff;
        border-radius: 14px;
        border: 1px solid #ede9fe;
        margin-bottom: 8px;
        transition: border-color 0.15s;
      }
      .theory-term-card:hover { border-color: #c4b5fd; }

      .theory-term-index {
        color: #a78bfa;
        font-weight: 700;
        font-size: 12px;
        min-width: 20px;
        padding-top: 3px;
        flex-shrink: 0;
        text-align: right;
      }

      .theory-term-body { flex: 1; font-size: 14px; line-height: 1.65; color: #374151; }
      .theory-term-name  { font-weight: 700; color: #111827; }
      .theory-term-dash  { color: #9ca3af; margin: 0 4px; }

      /* ── адаптив ── */
      @media (max-width: 720px) {
        .grid { grid-template-columns: 1fr; }
        .header-row { flex-direction: column; align-items: stretch; }
        .nav-actions { justify-content: stretch; }
        .action-btn { width: 100%; }
        .title { font-size: 26px; }

        .nav-actions {
          position: fixed;
          bottom: 0; left: 0; right: 0;
          display: flex;
          gap: 12px;
          padding: 12px 16px;
          background: #fff;
          justify-content: center;
          box-shadow: 0 -2px 12px rgba(0,0,0,0.08);
        }
        .nav-actions .action-btn { flex: 1; max-width: 200px; }
        .panel { padding-bottom: 80px; }

        /* теория на мобильных */
        .theory-topbar { padding: 10px 16px; }
        .theory-topbar-info h2 { font-size: 15px; }
        .theory-topbar-info p { display: none; }
        .theory-btn { padding: 7px 12px; font-size: 13px; }

        .theory-body { flex-direction: column; }

        .theory-sidebar {
          width: 100%;
          height: auto;
          position: sticky;
          top: 51px;                  /* высота topbar на мобильных */
          flex-direction: row;
          flex-wrap: nowrap;
          overflow-x: auto;
          overflow-y: hidden;
          padding: 8px 12px;
          border-right: none;
          border-bottom: 1px solid #e5e7eb;
          gap: 6px;
          scrollbar-width: none;
        }
        .theory-sidebar::-webkit-scrollbar { display: none; }
        .theory-sidebar-label { display: none; }
        .theory-nav-link {
          white-space: nowrap;
          flex-shrink: 0;
          padding: 6px 12px;
          font-size: 12px;
          align-items: center;
        }

        .theory-content { padding: 20px 16px 60px; }
        .theory-section { scroll-margin-top: 110px; /* topbar 51 + sidebar ~44 + зазор */ }
      }
      /* ══ ТРЕНИРОВКА ══ */
.trainer-counter { font-size: 12px; color: #9ca3af; margin-bottom: 6px; font-weight: 600; }
.trainer-progress-bar { height: 6px; background: #e5e7eb; border-radius: 3px; overflow: hidden; margin-bottom: 20px; }
.trainer-progress-fill { height: 100%; background: #8b5cf6; border-radius: 3px; transition: width 0.3s ease; }

.question-card { background: #fff; border-radius: 18px; padding: 24px; border: 1px solid #ede9fe; margin-bottom: 16px; }
.question-text { font-size: 16px; line-height: 1.6; color: #111827; font-weight: 500; margin: 0 0 20px; }

.yn-btns { display: flex; gap: 12px; }
.yn-btn { flex: 1; padding: 16px; border: none; border-radius: 14px; font-size: 16px; font-weight: 700; cursor: pointer; transition: transform 0.1s; }
.yn-btn:hover { transform: translateY(-2px); }
.yn-btn.yes { background: #d1fae5; color: #065f46; }
.yn-btn.no  { background: #fee2e2; color: #991b1b; }
.yn-btn.correct { background: #d1fae5 !important; color: #065f46 !important; }
.yn-btn.wrong   { background: #fee2e2 !important; color: #991b1b !important; }

.choice-options { display: flex; flex-direction: column; gap: 10px; }
.choice-opt { padding: 14px 18px; border: 2px solid #ede9fe; border-radius: 14px; background: #fff; font-size: 14px; line-height: 1.5; cursor: pointer; text-align: left; transition: border-color 0.15s, background 0.15s; display: flex; align-items: flex-start; gap: 12px; }
.choice-opt:hover { border-color: #a78bfa; background: #faf5ff; }
.choice-label { font-weight: 700; color: #8b5cf6; flex-shrink: 0; min-width: 20px; }
.choice-opt.correct { background: #d1fae5 !important; border-color: #6ee7b7 !important; color: #065f46 !important; }
.choice-opt.wrong   { background: #fee2e2 !important; border-color: #fca5a5 !important; color: #991b1b !important; }

.feedback-box { padding: 14px 18px; border-radius: 14px; margin-top: 12px; font-size: 14px; line-height: 1.5; }
.feedback-box.correct { background: #d1fae5; color: #065f46; border: 1px solid #6ee7b7; }
.feedback-box.wrong   { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
.feedback-correct-answer { margin-top: 8px; font-weight: 600; }

.next-btn { width: 100%; padding: 16px; background: #111827; color: #fff; border: none; border-radius: 14px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 16px; transition: opacity 0.15s; }
.next-btn:hover { opacity: 0.85; }

.writing-level-switcher { display: flex; gap: 6px; margin-bottom: 16px; background: #f3f4f6; padding: 4px; border-radius: 12px; }
.wl-btn { flex: 1; padding: 8px 6px; border: none; border-radius: 9px; font-size: 12px; font-weight: 600; cursor: pointer; background: transparent; color: #6b7280; transition: background 0.15s, color 0.15s; }
.wl-btn.active { background: #fff; color: #4c1d95; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }

.blank-input { display: inline-block; border: none; border-bottom: 2px solid #8b5cf6; background: transparent; font-size: 15px; font-family: inherit; padding: 2px 8px; width: 130px; text-align: center; margin: 0 4px; }
.blank-input:focus { outline: none; border-bottom-color: #4c1d95; }
.blank-input.correct { border-bottom-color: #10b981; color: #065f46; }
.blank-input.wrong   { border-bottom-color: #ef4444; color: #991b1b; }

.writing-input { width: 100%; padding: 12px 16px; border: 2px solid #ede9fe; border-radius: 12px; font-size: 15px; font-family: inherit; resize: vertical; min-height: 100px; margin-top: 12px; transition: border-color 0.15s; box-sizing: border-box; }
.writing-input:focus { outline: none; border-color: #8b5cf6; }
.writing-input.correct { border-color: #6ee7b7; background: #f0fdf4; }
.writing-input.wrong   { border-color: #fca5a5; background: #fff1f2; }

.result-screen { text-align: center; padding: 40px 20px; }
.result-emoji { font-size: 64px; margin-bottom: 16px; }
.result-percent { font-size: 56px; font-weight: 800; color: #4c1d95; margin: 0; }
.result-label { color: #6b7280; font-size: 16px; margin: 8px 0 24px; }
.result-stats { display: flex; gap: 16px; justify-content: center; margin-bottom: 32px; flex-wrap: wrap; }
.result-stat { background: #fff; border-radius: 14px; padding: 16px 24px; border: 1px solid #ede9fe; }
.result-stat-num { font-size: 24px; font-weight: 700; color: #111827; }
.result-stat-lbl { font-size: 12px; color: #6b7280; margin-top: 4px; }
    </style>
  </head>

      function goBack() {
        if (state.history.length === 0) return;
        const prev = state.history.pop();
        state.screen        = prev.screen;
        state.currentSection = prev.currentSection;
        state.currentTopic  = prev.currentTopic;
        state.trainerContext = prev.trainerContext;
        render();
      }

      function goHome() {
        state.screen        = "sections";
        state.currentSection = null;
        state.currentTopic  = null;
        state.trainerContext = null;
        state.history       = [{ screen: "welcome", currentSection: null, currentTopic: null, trainerContext: null }];
        render();
      }

      function openSections() {
        pushHistory({ screen: state.screen, currentSection: state.currentSection, currentTopic: state.currentTopic, trainerContext: state.trainerContext });
        state.screen        = "sections";
        state.currentSection = null;
        state.currentTopic  = null;
        state.trainerContext = null;
        localStorage.setItem("welcomeSeen", "true");
        render();
      }

      function openSection(sectionName) {
        const value = structure[sectionName];
        pushHistory({ screen: state.screen, currentSection: state.currentSection, currentTopic: state.currentTopic, trainerContext: state.trainerContext });

        if (value === "trainer") {
          state.screen        = "modes";
          state.currentSection = sectionName;
          state.currentTopic  = sectionName;
          state.trainerContext = { type: "section-direct", title: sectionName };
        } else if (value === "random-all") {
          state.screen        = "trainer";
          state.currentSection = null;
          state.currentTopic  = null;
          state.trainerContext = { type: "random-all", title: "Random по всем разделам" };
        } else {
          state.screen        = "subtopics";
          state.currentSection = sectionName;
          state.currentTopic  = null;
          state.trainerContext = null;
        }
        render();
      }

      function openSubtopic(subtopicName) {
        const currentData = state.currentTopic
          ? structure[state.currentSection][state.currentTopic]
          : structure[state.currentSection];

        let value;
        if (subtopicName === "Смешанная тренировка") {
          value = "mixed-topic";
        } else if (subtopicName === "Теория") {
          value = "theory";
        } else {
          value = currentData[subtopicName];
        }

        pushHistory({ screen: state.screen, currentSection: state.currentSection, currentTopic: state.currentTopic, trainerContext: state.trainerContext });

        if (value === "trainer") {
          state.screen       = "modes";
          state.currentTopic = subtopicName;
          state.trainerContext = null;

        } else if (value === "mixed-topic") {
          state.screen = "trainer";
          state.trainerContext = { type: "random-mode", title: "Смешанная тренировка" };

        } else if (value === "theory") {
          /* ── открываем экран теории ── */
          state.screen = "theory";
          state.trainerContext = {
            type:  "theory",
            title: "Теория",
            topic: state.currentTopic || state.currentSection   // "Нервная система"
          };

        } else if (value === "random-subtopics") {
          state.screen       = "trainer";
          state.currentTopic = null;
          state.trainerContext = { type: "random-subtopics", title: `Random по разделу ${state.currentSection}` };

        } else if (typeof value === "object" && value !== null) {
          state.screen       = "subtopics";
          state.currentTopic = subtopicName;
          state.trainerContext = null;
        }

        render();
      }

      function openTrainingMode(modeKey, modeLabel) {
        pushHistory({ screen: state.screen, currentSection: state.currentSection, currentTopic: state.currentTopic, trainerContext: state.trainerContext });
        state.screen = "trainer";
        state.trainerContext = modeKey === "random-mode"
          ? { type: "random-mode", title: `Random: ${state.currentTopic}`, mode: modeLabel }
          : { type: "mode",        title: state.currentTopic,              mode: modeLabel, modeKey: modeKey };
        render();
      }

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getBestScore(topic, mode) {
  const key = `best_${topic}_${mode}`;
  return localStorage.getItem(key);
}

function saveBestScore(topic, mode, percent) {
  const key = `best_${topic}_${mode}`;
  const prev = localStorage.getItem(key);
  if (!prev || percent > parseInt(prev)) {
    localStorage.setItem(key, percent);
  }
}

function runTrainer(topic, modeKey) {
  const data = trainingData[topic];
  if (!data) { renderTrainer(); return; }

  if (modeKey === "write-term") {
    runWriting(topic, "A");
    return;
  }

  const questions = shuffle(data[modeKey] || []);
  if (questions.length === 0) { renderTrainer(); return; }

  let current = 0;
  let correct = 0;
  let answered = false;

  function showQuestion() {
    answered = false;
    const q = questions[current];
    const total = questions.length;

    let questionHTML = "";

    if (modeKey === "yes-no") {
      questionHTML = `
        <div class="question-card">
          <p class="question-text">${escapeHtml(q.question)}</p>
          <div class="yn-btns">
            <button class="yn-btn yes" data-ans="true">✓ Да</button>
            <button class="yn-btn no" data-ans="false">✗ Нет</button>
          </div>
          <div id="feedback"></div>
        </div>`;
    } else if (modeKey === "choice-4") {
      questionHTML = `
        <div class="question-card">
          <p class="question-text">${escapeHtml(q.question)}</p>
          <div class="choice-options">
            ${q.options.map((opt, i) => `
              <button class="choice-opt" data-idx="${i}">
                <span class="choice-label">${["A","B","C","D"][i]}</span>
                <span>${escapeHtml(opt)}</span>
              </button>`).join("")}
          </div>
          <div id="feedback"></div>
        </div>`;
    } else if (modeKey === "close-definitions") {
      questionHTML = `
        <div class="question-card">
          <p class="question-text">Выбери верное определение термина: <strong>${escapeHtml(q.term)}</strong></p>
          <div class="choice-options">
            ${q.options.map((opt, i) => `
              <button class="choice-opt" data-idx="${i}">
                <span class="choice-label">${["A","B","C","D"][i]}</span>
                <span>${escapeHtml(opt)}</span>
              </button>`).join("")}
          </div>
          <div id="feedback"></div>
        </div>`;
    }

    app.innerHTML = `
      <div class="screen">
        <div class="app-shell">
          <div class="panel">
            <div class="header-row">
              <div class="header-text">
                <h2>${escapeHtml(topic)}</h2>
              </div>
              <div class="nav-actions">
                <button class="action-btn secondary" id="backBtn">Назад</button>
                <button class="action-btn" id="homeBtn">Меню</button>
              </div>
            </div>
            <div class="trainer-counter">Вопрос ${current + 1} из ${total}</div>
            <div class="trainer-progress-bar">
              <div class="trainer-progress-fill" style="width:${((current)/total)*100}%"></div>
            </div>
            ${questionHTML}
          </div>
        </div>
      </div>`;

    document.getElementById("backBtn").addEventListener("click", goBack);
    document.getElementById("homeBtn").addEventListener("click", goHome);

    if (modeKey === "yes-no") {
      document.querySelectorAll(".yn-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          if (answered) return;
          answered = true;
          const userAns = btn.getAttribute("data-ans") === "true";
          const isCorrect = userAns === q.answer;
          if (isCorrect) correct++;

          document.querySelectorAll(".yn-btn").forEach(b => {
            const bAns = b.getAttribute("data-ans") === "true";
            if (bAns === q.answer) b.classList.add("correct");
            else b.classList.add("wrong");
          });

          const fb = document.getElementById("feedback");
          if (isCorrect) {
            fb.innerHTML = `<div class="feedback-box correct">✓ Верно!</div>`;
          } else {
            fb.innerHTML = `<div class="feedback-box wrong">✗ Неверно!${q.correct ? `<div class="feedback-correct-answer">Правильно: ${escapeHtml(q.correct)}</div>` : ""}</div>`;
          }

          fb.innerHTML += `<button class="next-btn" id="nextBtn">${current + 1 < total ? "Следующий вопрос →" : "Завершить"}</button>`;
          document.getElementById("nextBtn").addEventListener("click", () => {
            current++;
            if (current < total) showQuestion();
            else showResult();
          });
        });
      });
    }

    if (modeKey === "choice-4" || modeKey === "close-definitions") {
      document.querySelectorAll(".choice-opt").forEach(btn => {
        btn.addEventListener("click", () => {
          if (answered) return;
          answered = true;
          const idx = parseInt(btn.getAttribute("data-idx"));
          const isCorrect = idx === q.answer;
          if (isCorrect) correct++;

          document.querySelectorAll(".choice-opt").forEach((b, i) => {
            if (i === q.answer) b.classList.add("correct");
            else if (i === idx && !isCorrect) b.classList.add("wrong");
          });

          const fb = document.getElementById("feedback");
          if (isCorrect) {
            fb.innerHTML = `<div class="feedback-box correct">✓ Верно!</div>`;
          } else {
            fb.innerHTML = `<div class="feedback-box wrong">✗ Неверно! Правильный ответ: ${["A","B","C","D"][q.answer]}</div>`;
          }

          fb.innerHTML += `<button class="next-btn" id="nextBtn">${current + 1 < total ? "Следующий вопрос →" : "Завершить"}</button>`;
          document.getElementById("nextBtn").addEventListener("click", () => {
            current++;
            if (current < total) showQuestion();
            else showResult();
          });
        });
      });
    }
  }

  function showResult() {
    const percent = Math.round((correct / questions.length) * 100);
    saveBestScore(topic, modeKey, percent);
    const emoji = percent >= 80 ? "🎉" : percent >= 50 ? "👍" : "📚";

    app.innerHTML = `
      <div class="screen">
        <div class="app-shell">
          <div class="panel">
            <div class="result-screen">
              <div class="result-emoji">${emoji}</div>
              <p class="result-percent">${percent}%</p>
              <p class="result-label">правильных ответов</p>
              <div class="result-stats">
                <div class="result-stat">
                  <div class="result-stat-num">${correct}</div>
                  <div class="result-stat-lbl">верно</div>
                </div>
                <div class="result-stat">
                  <div class="result-stat-num">${questions.length - correct}</div>
                  <div class="result-stat-lbl">ошибок</div>
                </div>
                <div class="result-stat">
                  <div class="result-stat-num">${questions.length}</div>
                  <div class="result-stat-lbl">всего</div>
                </div>
              </div>
              <button class="next-btn" id="retryBtn">Пройти ещё раз</button>
              <button class="next-btn" id="homeBtn" style="margin-top:10px;background:#e5e7eb;color:#111827;">В меню</button>
            </div>
          </div>
        </div>
      </div>`;

    document.getElementById("retryBtn").addEventListener("click", () => runTrainer(topic, modeKey));
    document.getElementById("homeBtn").addEventListener("click", goHome);
  }

  showQuestion();
}

            <div class="trainer-counter">Вопрос ${current + 1} из ${total}</div>
            <div class="trainer-progress-bar">
              <div class="trainer-progress-fill" style="width:${((current)/total)*100}%"></div>
            </div>
            ${questionHTML}
          </div>
        </div>
      </div>`;

    document.getElementById("backBtn").addEventListener("click", goBack);
    document.getElementById("homeBtn").addEventListener("click", goHome);

    document.querySelectorAll(".wl-btn").forEach(btn => {
      btn.addEventListener("click", () => runWriting(topic, btn.getAttribute("data-level")));
    });

    document.getElementById("checkBtn").addEventListener("click", () => {
      if (answered) return;
      answered = true;
      let isCorrect = false;

      if (level === "A") {
        const inputs = document.querySelectorAll(".blank-input");
        let allCorrect = true;
        inputs.forEach(inp => {
          const userVal = inp.value.trim().toLowerCase();
          const correctVal = inp.getAttribute("data-answer").toLowerCase();
          if (userVal === correctVal) {
            inp.classList.add("correct");
          } else {
            inp.classList.add("wrong");
            allCorrect = false;
          }
        });
        isCorrect = allCorrect;
        if (isCorrect) correct++;
        const fb = document.getElementById("feedback");
        fb.innerHTML = isCorrect
          ? `<div class="feedback-box correct" style="margin-top:12px">✓ Верно!</div>`
          : `<div class="feedback-box wrong" style="margin-top:12px">✗ Есть ошибки. Правильные ответы: <strong>${q.blanks.join(", ")}</strong></div>`;
      } else {
        const inp = document.getElementById("writingInput");
        const userVal = inp.value.trim().toLowerCase();
        const correctVal = q.answer.toLowerCase();
        isCorrect = userVal === correctVal;
        if (isCorrect) correct++;
        inp.classList.add(isCorrect ? "correct" : "wrong");
        const fb = document.getElementById("feedback");
        fb.innerHTML = isCorrect
          ? `<div class="feedback-box correct" style="margin-top:12px">✓ Верно!</div>`
          : `<div class="feedback-box wrong" style="margin-top:12px">✗ Неверно!<div class="feedback-correct-answer">Правильно: ${escapeHtml(q.answer)}</div></div>`;
      }

      const fb = document.getElementById("feedback");
      fb.innerHTML += `<button class="next-btn" id="nextBtn" style="margin-top:12px">${current + 1 < total ? "Следующий вопрос →" : "Завершить"}</button>`;
      document.getElementById("nextBtn").addEventListener("click", () => {
        current++;
        if (current < total) showQuestion();
        else showResult();
      });
    });
  }

  function showResult() {
    const percent = Math.round((correct / questions.length) * 100);
    saveBestScore(topic, `write-term-${level}`, percent);
    const emoji = percent >= 80 ? "🎉" : percent >= 50 ? "👍" : "📚";

    app.innerHTML = `
      <div class="screen">
        <div class="app-shell">
          <div class="panel">
            <div class="result-screen">
              <div class="result-emoji">${emoji}</div>
              <p class="result-percent">${percent}%</p>
              <p class="result-label">правильных ответов</p>
              <div class="result-stats">
                <div class="result-stat">
                  <div class="result-stat-num">${correct}</div>
                  <div class="result-stat-lbl">верно</div>
                </div>
                <div class="result-stat">
                  <div class="result-stat-num">${questions.length - correct}</div>
                  <div class="result-stat-lbl">ошибок</div>
                </div>
                <div class="result-stat">
                  <div class="result-stat-num">${questions.length}</div>
                  <div class="result-stat-lbl">всего</div>
                </div>
              </div>
              <button class="next-btn" id="retryBtn">Пройти ещё раз</button>
              <button class="next-btn" id="homeBtn" style="margin-top:10px;background:#e5e7eb;color:#111827;">В меню</button>
            </div>
          </div>
        </div>
      </div>`;

    document.getElementById("retryBtn").addEventListener("click", () => runWriting(topic, level));
    document.getElementById("homeBtn").addEventListener("click", goHome);
  }

  showQuestion();
}
      function renderTrainer() {
  if (state.trainerContext.type === "mode" && state.trainerContext.modeKey && state.currentTopic && trainingData[state.currentTopic]) {
    runTrainer(state.currentTopic, state.trainerContext.modeKey);
    return;
  }
        let heading = "", text = "";
        if (state.trainerContext.type === "random-all") {
          heading = "Random по всем разделам";
          text = "Здесь позже появится смешанная тренировка по всем разделам биологии.";
        } else if (state.trainerContext.type === "random-subtopics") {
          heading = state.trainerContext.title;
          text = "Здесь позже появится случайная тренировка по подтемам выбранного раздела.";
        } else if (state.trainerContext.type === "random-mode") {
          heading = state.trainerContext.title;
          text = "Здесь позже появится смешивание разных типов заданий внутри одной темы.";
        } else if (state.trainerContext.type === "section-direct") {
          heading = state.trainerContext.title;
          text = "Этот раздел ведёт сразу в тренажёр. Позже сюда будет добавлено наполнение.";
        } else {
          heading = `${state.trainerContext.title} — ${state.trainerContext.mode}`;
          text = "Здесь позже появится конкретный формат тренировки и реальные вопросы.";
        }
        app.innerHTML = `
          <div class="screen">
            <div class="app-shell">
              <div class="panel">
                <div class="header-row">
                  <div class="header-text">
                    <h2>${heading}</h2>
                    <p>Структура готова. Следующим шагом добавить наполнение заданий.</p>
                  </div>
                  <div class="nav-actions">
                    <button class="action-btn secondary" id="backBtn">Назад</button>
                    <button class="action-btn" id="homeBtn">Главное меню</button>
                  </div>
                </div>
                <div class="breadcrumbs">${buildBreadcrumbs()}</div>
                <div class="trainer-box">
                  <h3 class="trainer-title">Тренажёр</h3>
                  <p class="trainer-subtitle">Пока это экран-заглушка для выбранного режима.</p>
                  <div class="trainer-placeholder">
                    <h3>Что здесь будет дальше</h3>
                    <p>${text}</p>
                    <p><strong>Следующий шаг:</strong> начать по очереди наполнять режимы вопросами.</p>
                  </div>
                </div>
              </div>
            </div>
          </div>`;
        document.getElementById("backBtn").addEventListener("click", goBack);
        document.getElementById("homeBtn").addEventListener("click", goHome);
      }

      /* ── ТЕОРИЯ ── */
      function renderTheory() {
        const topic    = state.trainerContext && state.trainerContext.topic;
        const sections = (topic && theoryContent[topic]) || [];
        const totalTerms = sections.reduce((acc, s) => acc + s.terms.length, 0);

        const sidebarHTML = `
          <div class="theory-sidebar-label">Разделы</div>
          ${sections.map((s, i) => `
            <button class="theory-nav-link" data-target="${s.id}">
              <span class="theory-nav-num">${i + 1}</span>
              <span>${escapeHtml(s.title)}</span>
            </button>`).join("")}`;

        const contentHTML = sections.map(s => `
          <section class="theory-section" id="${s.id}">
            <div class="theory-section-header">
              <span class="theory-section-emoji">${s.emoji}</span>
              <h3 class="theory-section-title">${escapeHtml(s.title)}</h3>
            </div>
            ${s.terms.map((t, i) => `
              <div class="theory-term-card">
                <span class="theory-term-index">${i + 1}</span>
                <div class="theory-term-body">
                  <span class="theory-term-name">${escapeHtml(t.term)}</span><span class="theory-term-dash"> —</span> ${escapeHtml(t.def)}
                </div>
              </div>`).join("")}
          </section>`).join("");

        app.innerHTML = `
          <div class="theory-page">
            <div class="theory-topbar">
              <div class="theory-topbar-info">
                <h2>🧠 ${escapeHtml(topic || "Теория")}</h2>
                <p>${sections.length} разделов · ${totalTerms} терминов</p>
              </div>
              <div class="theory-topbar-btns">
                <button class="theory-btn secondary" id="backBtn">Назад</button>
                <button class="theory-btn" id="homeBtn">Меню</button>
              </div>
            </div>
            <div class="theory-body">
              <nav class="theory-sidebar">${sidebarHTML}</nav>
              <div class="theory-content">
                ${contentHTML || "<p style='color:#6b7280'>Теория для этого раздела ещё не добавлена.</p>"}
              </div>
            </div>
          </div>`;

        document.getElementById("backBtn").addEventListener("click", goBack);
        document.getElementById("homeBtn").addEventListener("click", goHome);

        /* клик по пункту меню → скролл к секции */
        document.querySelectorAll(".theory-nav-link").forEach(btn => {
          btn.addEventListener("click", () => {
            const el = document.getElementById(btn.getAttribute("data-target"));
            if (el) {
              el.scrollIntoView({ behavior: "smooth", block: "start" });
              setActiveTheoryNav(btn.getAttribute("data-target"));
            }
          });
        });

        /* IntersectionObserver — подсвечивает активный пункт при прокрутке */
        if (sections.length > 0) {
          const observer = new IntersectionObserver(entries => {
            entries.forEach(entry => {
              if (entry.isIntersecting) setActiveTheoryNav(entry.target.id);
            });
          }, { rootMargin: "-10% 0px -55% 0px", threshold: 0 });

          sections.forEach(s => {
            const el = document.getElementById(s.id);
            if (el) observer.observe(el);
          });
        }
      }

      /* подсвечивает нужный пункт и прокручивает к нему на мобильном */
      function setActiveTheoryNav(targetId) {
        document.querySelectorAll(".theory-nav-link").forEach(link => {
          const active = link.getAttribute("data-target") === targetId;
          link.classList.toggle("active", active);
          if (active) {
            /* центрирует пункт в горизонтальном скролле на мобильных */
            link.scrollIntoView({ behavior: "smooth", block: "nearest", inline: "center" });
          }
        });
      }

      /* ── хлебные крошки ── */
      function buildBreadcrumbs() {
        if (state.trainerContext?.type === "random-all")       return "Все разделы → Random";
        if (state.trainerContext?.type === "random-subtopics") return `${state.currentSection} → Random`;
        if (state.trainerContext?.type === "random-mode")
          return `${state.currentSection ? state.currentSection + " → " : ""}${state.currentTopic} → Random`;

        const parts = [];
        if (state.currentSection) parts.push(state.currentSection);
        if (state.currentTopic && state.currentTopic !== state.currentSection) parts.push(state.currentTopic);
        if (state.trainerContext?.mode && state.trainerContext.type !== "random-mode")
          parts.push(state.trainerContext.mode);
        return parts.join(" → ");
      }

      /* ══════════════════════════════════════════════════════
         ГЛАВНЫЙ РЕНДЕР
         ══════════════════════════════════════════════════════ */
      function render() {
        localStorage.setItem("bioState", JSON.stringify(state));
        if (state.screen === "welcome")   return renderWelcome();
        if (state.screen === "sections")  return renderSections();
        if (state.screen === "subtopics") return renderSubtopics();
        if (state.screen === "modes")     return renderModes();
        if (state.screen === "theory")    return renderTheory();
        return renderTrainer();
      }

      if (localStorage.getItem("welcomeSeen")) state.screen = "sections";
      render();
    </script>
  </body>
</html>
